name: Publish to npm

# Publishes @aauth/proxy when a version tag (vX.Y.Z) is pushed. Uses npm Trusted
# Publishing (OIDC) — no NPM_TOKEN secret in CI — and attaches a signed
# provenance attestation linking the tarball to this commit + workflow run.
#
# One-time trusted-publisher setup (npm >= 11; run locally after the first
# manual publish so the package exists in the registry):
#   npm trust github @aauth/proxy \
#     --repository aauth-dev/praca \
#     --file publish.yml \
#     --allow-publish
#   npm trust list @aauth/proxy   # verify
# After this the workflow publishes via OIDC without any stored token.
#
# Release flow:
#   1. Bump "version" in package.json on main and commit/push.
#   2. Tag the commit to match:  git tag v0.1.1 && git push origin v0.1.1
#   3. This workflow builds, tests, and publishes that version with provenance.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      # Trusted Publishing (OIDC) requires npm >= 11.
      - run: npm install -g npm@latest

      - run: npm ci

      # Guard: the pushed tag must match package.json (skipped on manual runs).
      - name: Verify tag matches package.json version
        if: github.ref_type == 'tag'
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match package.json version $PKG"
            exit 1
          fi

      - run: npm run typecheck
      - run: npm test

      # prepublishOnly runs the build; --provenance attaches the attestation.
      - run: npm publish --provenance --access public
